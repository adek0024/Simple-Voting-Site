<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zima w Obiektywie - Konkurs</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e6f7ff;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --danger-color: #dc3545;
            --shadow-soft: 0 10px 20px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e6f7ff 0%, #ffffff 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            color: var(--text-main);
            min-height: 100vh;
        }

        /* NAGŁÓWEK I LICZNIK */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .title-main {
            font-size: clamp(32px, 8vw, 56px);
            font-weight: 600;
            margin: 0;
            background: linear-gradient(45deg, #007bff, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #countdown {
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: var(--shadow-soft);
            margin-top: 20px;
            display: inline-block;
            font-weight: 600;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        /* SIATKA */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            max-width: 1200px;
            width: 100%;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .item-card:hover { transform: translateY(-10px); }

        .item-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            cursor: zoom-in;
        }

        .button-area { padding: 20px; flex-grow: 1; display: flex; align-items: flex-end; }

        .vote-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .vote-btn:hover { background: var(--primary-hover); }
        
        .vote-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* MODALE */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%; max-height: 90%;
            border-radius: 15px;
            cursor: zoom-in;
            transition: 0.3s;
        }

        .full-zoom { transform: scale(1.4); cursor: zoom-out; }

        .confirm-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }

        .confirm-btns { display: flex; gap: 10px; margin-top: 20px; }
        
        .btn-confirm { background: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; flex: 1; font-weight: bold; }
        .btn-cancel { background: #eee; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; flex: 1; }

        @media (max-width: 900px) { .grid-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .grid-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header-section">
        <h1 class="title-main">ZIMA W OBIEKTYWIE</h1>
        <div id="countdown">Ładowanie licznika...</div>
    </div>

    <div class="grid-container" id="gallery"></div>

    <div id="imgModal" class="modal" onclick="this.style.display='none'">
        <img id="fullImg" class="modal-content" onclick="event.stopPropagation(); this.classList.toggle('full-zoom')">
    </div>

    <div id="confirmModal" class="modal">
        <div class="confirm-box">
            <h3>Potwierdź swój głos</h3>
            <p id="confirmText"></p>
            <div class="confirm-btns">
                <button class="btn-confirm" id="finalOk">TAK, GŁOSUJ</button>
                <button class="btn-cancel" onclick="closeConfirm()">ANULUJ</button>
            </div>
        </div>
    </div>

	<script>
		// --- KONFIGURACJA ---
		const DEADLINE = new Date("March 13, 2026 17:40:00").getTime();
		
		const myData = [];
		for(let i=1; i<=20; i++) {
			// Zmienione na /static/media/ żeby Flask serwował zdjęcia poprawnie
			myData.push({ id: i, img: `/static/media/image${i}.jpg`, title: `Zdjęcie nr ${i}` });
		}

		let selectedId = null;
		let isExpired = false;

		// --- LICZNIK ---
		function updateTimer() {
			const now = new Date().getTime();
			const diff = DEADLINE - now;

			if (diff <= 0) {
				document.getElementById("countdown").innerHTML = "GŁOSOWANIE ZAKOŃCZONE";
				document.getElementById("countdown").style.color = "red";
				isExpired = true;
				disableButtons();
				return;
			}

			const d = Math.floor(diff / (1000*60*60*24));
			const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
			const m = Math.floor((diff % (1000*60*60)) / (1000*60));
			const s = Math.floor((diff % (1000*60)) / 1000);
			document.getElementById("countdown").innerHTML = `Koniec za: ${d}dni ${h}h ${m}m ${s}s`;
		}
		setInterval(updateTimer, 1000);

		// --- GALERIA ---
		const gallery = document.getElementById('gallery');
		myData.forEach(item => {
			const card = document.createElement('div');
			card.className = 'item-card';
			card.innerHTML = `
				<img src="${item.img}" onclick="openImg('${item.img}')"
					 onerror="this.src='https://via.placeholder.com/400x300?text=Zdjęcie+${item.id}'">
				<div class="button-area">
					<button class="vote-btn" onclick="askVote(${item.id})">GŁOSUJ NA NR ${item.id}</button>
				</div>
			`;
			gallery.appendChild(card);
		});

		function disableButtons() {
			document.querySelectorAll('.vote-btn').forEach(btn => {
				btn.disabled = true;
				btn.innerText = "KONIEC";
			});
		}

		// --- MODALE ---
		function openImg(src) {
			const m = document.getElementById('imgModal');
			document.getElementById('fullImg').src = src;
			m.style.display = 'flex';
		}

		function askVote(id) {
			if(isExpired) return;
			selectedId = id;
			document.getElementById('confirmText').innerText = `Czy na pewno chcesz oddać głos na zdjęcie nr ${id}?`;
			document.getElementById('confirmModal').style.display = 'flex';
		}

		function closeConfirm() { document.getElementById('confirmModal').style.display = 'none'; }

		document.getElementById('finalOk').onclick = function() {
			fetch("/vote", {
				method: "POST",
				headers: {"Content-Type": "application/json"},
				body: JSON.stringify({photo_id: selectedId})
			})
			.then(res => res.text())
			.then(msg => {
				alert(msg);          // pokazujemy alert z odpowiedzią
				closeConfirm();      // automatycznie zamykamy modal
			});
		};
		window.onclick = function(e) {
			if (e.target.className === 'modal') {
				e.target.style.display = 'none';
			}
		};
	</script>
</body>
</html>
